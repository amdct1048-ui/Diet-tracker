<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>다이어트 트래커</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#f0f4f8;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;}
  input,button{font-family:inherit;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-thumb{background:#c5d5e4;border-radius:4px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect} = React;

const C = {
  primary:"#7c9cbf", primaryDk:"#5a7a9e", primaryLt:"#b8d0e8",
  accent:"#9b87c4", accentLt:"#c5b8e0",
  bg:"#f0f4f8", surface:"#ffffff", border:"#dce7f0",
  textMain:"#2d3f52", textSub:"#7a93a8", textMute:"#a8bfcc",
  warn:"#c4748a", good:"#6baa9f",
};

const TABS = ["홈","체크리스트","기록","리포트"];
const WEEKDAYS = ["월","화","수","목","금","토","일"];
const SAMPLE = [
  {id:1,text:"물 2L 마시기"},
  {id:2,text:"야식 금지"},
  {id:3,text:"저녁 9시 이후 금식"},
  {id:4,text:"30분 이상 운동"},
];

// localStorage 헬퍼
function load(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }
  catch { return def; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function todayKey() { return new Date().toISOString().slice(0,10); }

function getWeekDates(ref) {
  const d = ref ? new Date(ref) : new Date();
  const day = d.getDay();
  const diff = day===0 ? -6 : 1-day;
  return Array.from({length:7},(_,i)=>{
    const x = new Date(d);
    x.setDate(d.getDate()+diff+i);
    return x.toISOString().slice(0,10);
  });
}

function fmtDate(s) {
  const [,m,d] = s.split("-");
  return `${parseInt(m)}/${parseInt(d)}`;
}

function CircleProgress({pct, size=90, stroke=7, color="#7c9cbf", label}) {
  const r=(size-stroke)/2, circ=2*Math.PI*r, dash=circ*Math.min(pct,1);
  return (
    <div style={{position:"relative",width:size,height:size}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#dce7f0" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          style={{transition:"stroke-dasharray 0.6s ease"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:17,fontWeight:700,color:C.textMain,fontFamily:"monospace"}}>{Math.round(pct*100)}%</span>
        {label && <span style={{fontSize:10,color:C.textSub,marginTop:2}}>{label}</span>}
      </div>
    </div>
  );
}

function WeightChart({data, target}) {
  if(data.length<2) return null;
  const w=310,h=110,pL=34,pR=14,pT=14,pB=26;
  const vals=data.map(d=>d.value);
  const minV=Math.min(...vals,target)-0.5, maxV=Math.max(...vals)+0.5;
  const range=maxV-minV||1;
  const iw=w-pL-pR, ih=h-pT-pB;
  const toX=i=>pL+(i/(data.length-1))*iw;
  const toY=v=>pT+((maxV-v)/range)*ih;
  const pts=data.map((d,i)=>`${toX(i)},${toY(d.value)}`).join(" ");
  const ty=toY(target);
  return (
    <svg width={w} height={h} style={{overflow:"visible"}}>
      <line x1={pL} y1={ty} x2={w-pR} y2={ty} stroke={C.good} strokeWidth={1} strokeDasharray="4 3" opacity={0.6}/>
      <text x={pL-3} y={ty-4} fontSize={9} fill={C.good} textAnchor="end" opacity={0.9}>목표</text>
      <polyline points={pts} fill="none" stroke={C.primary} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>
      {data.map((d,i)=>(
        <g key={i}>
          <circle cx={toX(i)} cy={toY(d.value)} r={4} fill={C.primary}/>
          <text x={toX(i)} y={toY(d.value)-7} fontSize={10} fill={C.primary} textAnchor="middle" fontFamily="monospace" fontWeight={700}>{d.value}</text>
        </g>
      ))}
      {data.map((d,i)=> i%Math.ceil(data.length/5)===0 && (
        <text key={i} x={toX(i)} y={h-2} fontSize={9} fill={C.textMute} textAnchor="middle">{fmtDate(d.date)}</text>
      ))}
    </svg>
  );
}

function App() {
  const [tab, setTab] = useState(0);
  // localStorage에서 초기값 불러오기
  const [setup, setSetup] = useState(()=>load("dt_setup",null));
  const [form, setForm] = useState({
    startWeight:"",targetWeight:"",startDate:"",endDate:"",
    rule1:"주 3회 이상 운동하기",rule2:"클린 식단 유지하기",rule3:"밤 10시 이후 금식하기"
  });
  const [checkItems, setCheckItems] = useState(()=>load("dt_checkItems",SAMPLE));
  const [newItem, setNewItem] = useState("");
  const [checks, setChecks] = useState(()=>load("dt_checks",{}));
  const [records, setRecords] = useState(()=>load("dt_records",{}));
  const [mealIn, setMealIn] = useState({name:"",cal:""});
  const [exIn, setExIn] = useState({name:"",duration:"",cal:""});
  const [wIn, setWIn] = useState("");
  const [aiMeal, setAiMeal] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [aiResult, setAiResult] = useState(null);
  const [weekOff, setWeekOff] = useState(0);

  // 변경될 때마다 자동 저장
  useEffect(()=>{ save("dt_setup", setup); }, [setup]);
  useEffect(()=>{ save("dt_checkItems", checkItems); }, [checkItems]);
  useEffect(()=>{ save("dt_checks", checks); }, [checks]);
  useEffect(()=>{ save("dt_records", records); }, [records]);

  const today = todayKey();

  // ── 셋업 화면 ──
  if(!setup) {
    const iSt={width:"100%",padding:"11px 13px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,outline:"none",color:C.textMain,background:"#fafcff"};
    return (
      <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:C.surface,borderRadius:24,padding:"40px 28px",width:"100%",maxWidth:400,boxShadow:"0 4px 28px rgba(100,130,160,0.12)"}}>
          <div style={{fontSize:26,fontWeight:800,color:C.textMain,marginBottom:4}}>목표 설정</div>
          <div style={{fontSize:13,color:C.textSub,marginBottom:28}}>다이어트 목표와 필수 규칙을 입력해주세요</div>

          <div style={{fontSize:11,fontWeight:700,color:C.textSub,letterSpacing:1,marginBottom:14,textTransform:"uppercase"}}>몸무게 & 기간</div>
          {[
            {label:"시작 몸무게 (kg)",key:"startWeight",placeholder:"예: 72.0"},
            {label:"목표 몸무게 (kg)",key:"targetWeight",placeholder:"예: 65.0"},
            {label:"시작 날짜",key:"startDate",type:"date"},
            {label:"목표 날짜",key:"endDate",type:"date"},
          ].map(({label,key,placeholder,type})=>(
            <div key={key} style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:600,color:C.textSub,marginBottom:5}}>{label}</div>
              <input type={type||"number"} placeholder={placeholder||""} value={form[key]}
                onChange={e=>setForm(f=>({...f,[key]:e.target.value}))} style={iSt}/>
            </div>
          ))}

          <div style={{fontSize:11,fontWeight:700,color:C.textSub,letterSpacing:1,margin:"20px 0 14px",textTransform:"uppercase"}}>꼭 지켜야 할 규칙 3가지</div>
          {["rule1","rule2","rule3"].map((key,i)=>(
            <div key={key} style={{marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:24,height:24,borderRadius:"50%",background:`linear-gradient(135deg,${C.primary},${C.accent})`,color:"#fff",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</div>
              <input placeholder={`규칙 ${i+1}`} value={form[key]}
                onChange={e=>setForm(f=>({...f,[key]:e.target.value}))}
                style={{...iSt,width:"auto",flex:1}}/>
            </div>
          ))}

          <button onClick={()=>{
            if(!form.targetWeight||!form.startWeight||!form.startDate||!form.endDate) {
              alert("모든 항목을 입력해주세요!"); return;
            }
            setSetup(form);
          }} style={{width:"100%",padding:14,borderRadius:12,marginTop:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,color:"#fff",fontWeight:700,fontSize:15,border:"none",cursor:"pointer"}}>
            시작하기 →
          </button>
        </div>
      </div>
    );
  }

  // ── 계산 ──
  const totalDays=Math.max(1,Math.ceil((new Date(setup.endDate)-new Date(setup.startDate))/86400000));
  const passedDays=Math.max(0,Math.ceil((new Date(today)-new Date(setup.startDate))/86400000));
  const dayPct=Math.min(passedDays/totalDays,1);
  const rec0=records[today]||{};
  const ch0=checks[today]||{};
  const todayWeight=rec0.weight||null;
  const startW=parseFloat(setup.startWeight), targetW=parseFloat(setup.targetWeight);
  const lostW=todayWeight ? startW-todayWeight : 0;
  const needLose=startW-targetW;
  const weightPct=needLose>0 ? Math.max(0,Math.min(lostW/needLose,1)) : 0;
  const todayMeals=rec0.meals||[], todayExs=rec0.exercises||[];
  const todayCal=todayMeals.reduce((s,m)=>s+(m.cal||0),0);
  const todayBurn=todayExs.reduce((s,e)=>s+(e.cal||0),0);
  const checkDone=checkItems.filter(it=>ch0[it.id]).length;
  const checkPct=checkItems.length>0 ? checkDone/checkItems.length : 0;
  const weekDates=getWeekDates(today);
  const weekPcts=weekDates.map(d=>{
    const dc=checks[d]||{};
    const done=checkItems.filter(it=>dc[it.id]).length;
    return checkItems.length>0 ? done/checkItems.length : 0;
  });
  const allWeightData=Object.entries(records)
    .filter(([,r])=>r.weight)
    .sort(([a],[b])=>a.localeCompare(b))
    .map(([date,r])=>({date,value:r.weight}));
  const refD=new Date(today);
  refD.setDate(refD.getDate()+weekOff*7);
  const repWeek=getWeekDates(refD.toISOString().slice(0,10));
  const repLabel=`${fmtDate(repWeek[0])} ~ ${fmtDate(repWeek[6])}`;
  const rules=[setup.rule1,setup.rule2,setup.rule3].filter(Boolean);

  // ── AI 칼로리 ──
  async function handleAI() {
    if(!aiMeal.trim()) return;
    setAiLoading(true); setAiResult(null);
    try {
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:200,
          system:`당신은 음식 칼로리 계산 전문가입니다. 사용자가 음식 이름을 입력하면 예상 칼로리를 JSON으로만 응답하세요. 형식: {"name":"음식명","cal":숫자,"unit":"단위","note":"설명"} 절대 다른 텍스트 없이 JSON만 응답하세요.`,
          messages:[{role:"user",content:aiMeal}]
        })
      });
      const data=await res.json();
      const txt=data.content?.map(c=>c.text||"").join("")||"";
      setAiResult(JSON.parse(txt.replace(/```json|```/g,"").trim()));
    } catch { setAiResult({error:true}); }
    setAiLoading(false);
  }

  // ── 데이터 액션 ──
  function addMeal(name,cal) {
    setRecords(r=>{const p=r[today]||{};return{...r,[today]:{...p,meals:[...(p.meals||[]),{name,cal:parseInt(cal)}]}};});
    setMealIn({name:"",cal:""}); setAiResult(null); setAiMeal("");
  }
  function rmMeal(i) { setRecords(r=>{const p=r[today]||{};const m=[...(p.meals||[])];m.splice(i,1);return{...r,[today]:{...p,meals:m}};}); }
  function addEx() {
    if(!exIn.name) return;
    setRecords(r=>{const p=r[today]||{};return{...r,[today]:{...p,exercises:[...(p.exercises||[]),{...exIn,cal:parseInt(exIn.cal)||0,duration:parseInt(exIn.duration)||0}]}};});
    setExIn({name:"",duration:"",cal:""});
  }
  function rmEx(i) { setRecords(r=>{const p=r[today]||{};const e=[...(p.exercises||[])];e.splice(i,1);return{...r,[today]:{...p,exercises:e}};}); }
  function saveW() { if(!wIn) return; setRecords(r=>{const p=r[today]||{};return{...r,[today]:{...p,weight:parseFloat(wIn)}};});setWIn(""); }
  function toggleChk(id) { setChecks(c=>{const p=c[today]||{};return{...c,[today]:{...p,[id]:!p[id]}}}); }
  function addChkItem() { if(!newItem.trim()) return; setCheckItems(it=>[...it,{id:Date.now(),text:newItem.trim()}]);setNewItem(""); }
  function rmChkItem(id) { setCheckItems(it=>it.filter(i=>i.id!==id)); }

  // ── UI 공통 ──
  const Card=({children,style})=>(
    <div style={{background:C.surface,borderRadius:18,padding:"18px 18px",boxShadow:"0 2px 14px rgba(100,130,160,0.08)",marginBottom:13,...style}}>{children}</div>
  );
  const Label=({children})=>(
    <div style={{fontSize:10,fontWeight:700,color:C.textMute,letterSpacing:1.2,marginBottom:12,textTransform:"uppercase"}}>{children}</div>
  );
  const iSt={padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,outline:"none",color:C.textMain,background:"#fafcff"};
  const btnPrimary={background:`linear-gradient(135deg,${C.primary},${C.accent})`,color:"#fff",border:"none",borderRadius:10,fontWeight:700,cursor:"pointer"};

  return (
    <div style={{minHeight:"100vh",background:C.bg,maxWidth:440,margin:"0 auto",paddingBottom:90}}>

      {/* 헤더 */}
      <div style={{padding:"22px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,color:C.textMain}}>다이어트 트래커</div>
          <div style={{fontSize:12,color:C.textSub,marginTop:2}}>{setup.startDate} ~ {setup.endDate}</div>
        </div>
        <div style={{fontSize:10,color:C.textMute,marginTop:4,textAlign:"right"}}>
          💾 자동저장 중
        </div>
      </div>

      {/* 탭 */}
      <div style={{padding:"13px 20px 0"}}>
        <div style={{display:"flex",background:"#e8eef4",borderRadius:11,padding:3,gap:2}}>
          {TABS.map((t,i)=>(
            <button key={t} onClick={()=>setTab(i)} style={{
              flex:1,padding:"9px 0",border:"none",
              background:i===tab?`linear-gradient(135deg,${C.primary},${C.accent})`:"transparent",
              color:i===tab?"#fff":C.textSub,
              fontWeight:i===tab?700:500,
              fontSize:12,borderRadius:9,cursor:"pointer",transition:"all 0.2s",fontFamily:"inherit"
            }}>{t}</button>
          ))}
        </div>
      </div>

      <div style={{padding:"14px 20px 0"}}>

        {/* ══ 홈 ══ */}
        {tab===0 && <>
          <Card style={{background:`linear-gradient(135deg,${C.primary} 0%,${C.accent} 100%)`,color:"#fff",padding:"26px 22px"}}>
            <div style={{fontSize:11,fontWeight:600,opacity:0.8,marginBottom:4}}>목표 몸무게</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:6}}>
              <span style={{fontSize:50,fontWeight:800,lineHeight:1,fontFamily:"monospace"}}>{setup.targetWeight}</span>
              <span style={{fontSize:18,fontWeight:600,marginBottom:5}}>kg</span>
            </div>
            <div style={{fontSize:12,opacity:0.85,marginTop:5}}>
              {startW}kg → {setup.targetWeight}kg · {needLose>0?`${needLose.toFixed(1)}kg 감량`:"유지"}
            </div>
            {rules.length>0 && (
              <div style={{marginTop:16,background:"rgba(255,255,255,0.18)",borderRadius:12,padding:"12px 14px"}}>
                <div style={{fontSize:10,fontWeight:700,opacity:0.75,letterSpacing:1,marginBottom:8,textTransform:"uppercase"}}>꼭 지켜야 할 것</div>
                {rules.map((r,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:i<rules.length-1?6:0}}>
                    <div style={{width:18,height:18,borderRadius:"50%",background:"rgba(255,255,255,0.3)",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</div>
                    <span style={{fontSize:12,fontWeight:500,opacity:0.95}}>{r}</span>
                  </div>
                ))}
              </div>
            )}
            <div style={{marginTop:16,background:"rgba(255,255,255,0.25)",borderRadius:8,height:7,overflow:"hidden"}}>
              <div style={{height:"100%",background:"#fff",borderRadius:8,width:`${weightPct*100}%`,transition:"width 0.6s ease"}}/>
            </div>
            <div style={{fontSize:11,opacity:0.8,marginTop:5}}>
              감량 진행률 {Math.round(weightPct*100)}% · D-{Math.max(0,totalDays-passedDays)}
            </div>
          </Card>

          <div style={{display:"flex",gap:12,marginBottom:13}}>
            <Card style={{flex:1,marginBottom:0}}>
              <Label>오늘 몸무게</Label>
              <div style={{fontSize:24,fontWeight:800,color:C.textMain,fontFamily:"monospace"}}>
                {todayWeight||"—"}<span style={{fontSize:13,fontWeight:500,color:C.textSub}}> kg</span>
              </div>
              {todayWeight&&lostW!==0&&(
                <div style={{fontSize:12,color:lostW>0?C.good:C.warn,marginTop:3,fontWeight:600}}>
                  {lostW>0?`▼ ${lostW.toFixed(1)}kg`:`▲ ${Math.abs(lostW).toFixed(1)}kg`}
                </div>
              )}
            </Card>
            <Card style={{flex:1,marginBottom:0}}>
              <Label>오늘 칼로리</Label>
              <div style={{fontSize:24,fontWeight:800,color:C.textMain,fontFamily:"monospace"}}>
                {todayCal}<span style={{fontSize:13,fontWeight:500,color:C.textSub}}> kcal</span>
              </div>
              {todayBurn>0&&<div style={{fontSize:12,color:C.good,marginTop:3,fontWeight:600}}>🔥 -{todayBurn} 소모</div>}
            </Card>
          </div>

          <Card>
            <Label>오늘 체크리스트</Label>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <CircleProgress pct={checkPct} size={86} label="달성"/>
              <div>
                <div style={{fontSize:22,fontWeight:800,color:C.textMain}}>{checkDone} / {checkItems.length}</div>
                <div style={{fontSize:13,color:C.textSub,marginTop:4}}>항목 완료</div>
                {checkPct===1&&<div style={{fontSize:12,color:C.good,fontWeight:700,marginTop:5}}>🎉 오늘 모두 달성!</div>}
              </div>
            </div>
          </Card>

          {allWeightData.length>=2&&(
            <Card>
              <Label>몸무게 추이</Label>
              <div style={{overflowX:"auto"}}><WeightChart data={allWeightData} target={targetW}/></div>
            </Card>
          )}

          <Card>
            <Label>기간 진행</Label>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <CircleProgress pct={dayPct} size={86} color={C.accent} label="진행"/>
              <div>
                <div style={{fontSize:22,fontWeight:800,color:C.textMain}}>D+{passedDays}</div>
                <div style={{fontSize:13,color:C.textSub,marginTop:4}}>전체 {totalDays}일 중</div>
                <div style={{fontSize:12,color:C.accent,fontWeight:700,marginTop:5}}>D-{Math.max(0,totalDays-passedDays)} 남음</div>
              </div>
            </div>
          </Card>
        </>}

        {/* ══ 체크리스트 ══ */}
        {tab===1 && <>
          <Card>
            <Label>오늘 체크 — {today}</Label>
            {checkItems.length===0&&(
              <div style={{textAlign:"center",padding:"20px 0",color:C.textMute,fontSize:14}}>아래에서 항목을 추가해 주세요</div>
            )}
            {checkItems.map(it=>(
              <div key={it.id} onClick={()=>toggleChk(it.id)}
                style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:`1px solid ${C.border}`,cursor:"pointer"}}>
                <div style={{
                  width:22,height:22,borderRadius:7,border:"2px solid",
                  borderColor:ch0[it.id]?C.primary:C.border,
                  background:ch0[it.id]?C.primary:"#fff",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  transition:"all 0.15s",flexShrink:0
                }}>
                  {ch0[it.id]&&<span style={{color:"#fff",fontSize:13,fontWeight:700}}>✓</span>}
                </div>
                <span style={{fontSize:14,color:ch0[it.id]?C.textMute:C.textMain,textDecoration:ch0[it.id]?"line-through":"none",transition:"all 0.15s",flex:1}}>{it.text}</span>
              </div>
            ))}
            {checkItems.length>0&&(
              <div style={{marginTop:12,textAlign:"right"}}>
                <span style={{fontSize:13,color:C.primary,fontWeight:700}}>{checkDone}/{checkItems.length} 완료</span>
              </div>
            )}
          </Card>

          <Card>
            <Label>이번 주 달성 현황</Label>
            <div style={{display:"flex",gap:5}}>
              {weekDates.map((d,i)=>{
                const pct=weekPcts[i], isToday=d===today;
                return (
                  <div key={d} style={{flex:1,textAlign:"center"}}>
                    <div style={{fontSize:10,color:C.textSub,marginBottom:5}}>{WEEKDAYS[i]}</div>
                    <div style={{height:46,borderRadius:8,background:"#eef3f8",position:"relative",overflow:"hidden",border:isToday?`2px solid ${C.primary}`:"2px solid transparent"}}>
                      <div style={{position:"absolute",bottom:0,left:0,right:0,height:`${pct*100}%`,background:pct===1?C.primary:C.primaryLt,transition:"height 0.4s ease"}}/>
                    </div>
                    <div style={{fontSize:9,color:C.textSub,marginTop:3}}>{Math.round(pct*100)}%</div>
                  </div>
                );
              })}
            </div>
          </Card>

          <Card>
            <Label>항목 관리</Label>
            {checkItems.map(it=>(
              <div key={it.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${C.border}`,background:"#f8fafc",flexShrink:0}}/>
                <span style={{flex:1,fontSize:14,color:C.textMain}}>{it.text}</span>
                <button onClick={()=>rmChkItem(it.id)} style={{background:"none",border:"none",color:C.textMute,cursor:"pointer",fontSize:18,padding:"0 4px"}}>×</button>
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <input value={newItem} onChange={e=>setNewItem(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&addChkItem()}
                placeholder="새 항목 추가..."
                style={{...iSt,flex:1}}/>
              <button onClick={addChkItem} style={{...btnPrimary,padding:"10px 16px",fontSize:16}}>+</button>
            </div>
          </Card>
        </>}

        {/* ══ 기록 ══ */}
        {tab===2 && <>
          <Card>
            <Label>몸무게 기록</Label>
            <div style={{display:"flex",gap:8}}>
              <input type="number" value={wIn} onChange={e=>setWIn(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&saveW()}
                placeholder={todayWeight?`현재: ${todayWeight}kg`:"오늘 몸무게 (kg)"}
                style={{...iSt,flex:1,fontFamily:"monospace"}}/>
              <button onClick={saveW} style={{...btnPrimary,padding:"10px 18px",fontSize:14}}>저장</button>
            </div>
          </Card>

          <Card>
            <Label>식단 기록 · AI 칼로리 계산</Label>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <input value={aiMeal} onChange={e=>setAiMeal(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&handleAI()}
                placeholder="음식 이름으로 칼로리 검색..."
                style={{...iSt,flex:1}}/>
              <button onClick={handleAI} disabled={aiLoading} style={{...btnPrimary,padding:"10px 13px",fontSize:12,whiteSpace:"nowrap"}}>
                {aiLoading?"⏳":"🤖 AI"}
              </button>
            </div>
            {aiResult&&!aiResult.error&&(
              <div style={{background:"#f0f5fb",border:`1.5px solid ${C.primaryLt}`,borderRadius:10,padding:"11px 13px",marginBottom:12}}>
                <div style={{fontSize:14,fontWeight:700,color:C.primaryDk}}>
                  {aiResult.name} — {aiResult.cal} kcal
                  <span style={{fontSize:11,fontWeight:400,color:C.textSub,marginLeft:6}}>/ {aiResult.unit}</span>
                </div>
                {aiResult.note&&<div style={{fontSize:12,color:C.textSub,marginTop:3}}>{aiResult.note}</div>}
                <button onClick={()=>addMeal(aiResult.name,aiResult.cal)}
                  style={{...btnPrimary,marginTop:10,padding:"7px 15px",fontSize:13}}>+ 식단에 추가</button>
              </div>
            )}
            {aiResult?.error&&<div style={{color:C.warn,fontSize:13,marginBottom:10}}>검색 실패. 직접 입력해 주세요.</div>}

            <div style={{display:"flex",gap:7,marginBottom:10}}>
              <input value={mealIn.name} onChange={e=>setMealIn(m=>({...m,name:e.target.value}))}
                placeholder="음식 이름" style={{...iSt,flex:2}}/>
              <input type="number" value={mealIn.cal} onChange={e=>setMealIn(m=>({...m,cal:e.target.value}))}
                placeholder="kcal" style={{...iSt,flex:1,fontFamily:"monospace"}}/>
              <button onClick={()=>{if(mealIn.name&&mealIn.cal)addMeal(mealIn.name,mealIn.cal);}}
                style={{...btnPrimary,padding:"10px 13px",fontSize:16}}>+</button>
            </div>
            {todayMeals.map((m,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:14,color:C.textMain}}>{m.name}</span>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:13,fontWeight:700,color:C.accent,fontFamily:"monospace"}}>{m.cal} kcal</span>
                  <button onClick={()=>rmMeal(i)} style={{background:"none",border:"none",color:C.textMute,cursor:"pointer",fontSize:16}}>×</button>
                </div>
              </div>
            ))}
            {todayMeals.length>0&&<div style={{textAlign:"right",marginTop:10,fontSize:14,fontWeight:800,color:C.accent}}>합계: {todayCal} kcal</div>}
          </Card>

          <Card>
            <Label>운동 기록</Label>
            <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
              <input value={exIn.name} onChange={e=>setExIn(x=>({...x,name:e.target.value}))}
                placeholder="운동 이름" style={{...iSt,flex:"2 1 90px"}}/>
              <input type="number" value={exIn.duration} onChange={e=>setExIn(x=>({...x,duration:e.target.value}))}
                placeholder="분" style={{...iSt,flex:"1 1 44px",fontFamily:"monospace"}}/>
              <input type="number" value={exIn.cal} onChange={e=>setExIn(x=>({...x,cal:e.target.value}))}
                placeholder="소모kcal" style={{...iSt,flex:"1 1 60px",fontFamily:"monospace"}}/>
              <button onClick={addEx} style={{...btnPrimary,padding:"10px 14px",fontSize:16,background:"#c4826a"}}>+</button>
            </div>
            {todayExs.map((ex,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:14,color:C.textMain}}>🏃 {ex.name}{ex.duration?` (${ex.duration}분)`:""}</span>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:13,fontWeight:700,color:"#c4826a",fontFamily:"monospace"}}>-{ex.cal} kcal</span>
                  <button onClick={()=>rmEx(i)} style={{background:"none",border:"none",color:C.textMute,cursor:"pointer",fontSize:16}}>×</button>
                </div>
              </div>
            ))}
            {todayExs.length>0&&<div style={{textAlign:"right",marginTop:10,fontSize:14,fontWeight:800,color:"#c4826a"}}>총 소모: {todayBurn} kcal</div>}
          </Card>
        </>}

        {/* ══ 리포트 ══ */}
        {tab===3 && <>
          <Card>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <button onClick={()=>setWeekOff(o=>o-1)} style={{background:"#eef3f8",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:18,color:C.textSub,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:13,fontWeight:700,color:C.textMain}}>{repLabel}</div>
                {weekOff===0&&<div style={{fontSize:10,color:C.primary,fontWeight:600,marginTop:2}}>이번 주</div>}
              </div>
              <button onClick={()=>setWeekOff(o=>Math.min(o+1,0))} style={{background:"#eef3f8",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:18,color:weekOff===0?C.textMute:C.textSub,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
              {WEEKDAYS.map(d=>(
                <div key={d} style={{textAlign:"center",fontSize:10,color:C.textMute,fontWeight:600,padding:"4px 0"}}>{d}</div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
              {repWeek.map((d,i)=>{
                const rec=records[d]||{}, ch=checks[d]||{};
                const done=checkItems.filter(it=>ch[it.id]).length;
                const pct=checkItems.length>0?done/checkItems.length:0;
                const hasWeight=!!rec.weight, hasMeal=(rec.meals||[]).length>0, hasEx=(rec.exercises||[]).length>0;
                const isToday=d===today, isFuture=d>today;
                const dayNum=parseInt(d.slice(8));
                return (
                  <div key={d} style={{
                    borderRadius:12,padding:"8px 4px",
                    background:isToday?`linear-gradient(135deg,${C.primary}22,${C.accent}22)`:isFuture?"#f8fafc":pct>0?"#f0f5fb":"#f8fafc",
                    border:isToday?`2px solid ${C.primary}`:"2px solid transparent",
                    minHeight:72,display:"flex",flexDirection:"column",alignItems:"center",
                    opacity:isFuture?0.38:1,
                  }}>
                    <div style={{fontSize:13,fontWeight:isToday?800:600,color:isToday?C.primary:C.textMain,marginBottom:5}}>{dayNum}</div>
                    {!isFuture&&(
                      <div style={{width:"80%",height:3,borderRadius:4,background:"#e8eef4",marginBottom:5,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${pct*100}%`,background:pct===1?C.good:C.primary,borderRadius:4}}/>
                      </div>
                    )}
                    {!isFuture&&(
                      <div style={{display:"flex",gap:1,flexWrap:"wrap",justifyContent:"center"}}>
                        {hasWeight&&<span style={{fontSize:10}}>⚖️</span>}
                        {hasMeal&&<span style={{fontSize:10}}>🍽</span>}
                        {hasEx&&<span style={{fontSize:10}}>💪</span>}
                      </div>
                    )}
                    {hasWeight&&(
                      <div style={{fontSize:9,color:C.primaryDk,fontWeight:700,marginTop:3,fontFamily:"monospace"}}>{rec.weight}</div>
                    )}
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",gap:12,marginTop:14,justifyContent:"center"}}>
              {[["⚖️","몸무게"],["🍽","식단"],["💪","운동"]].map(([icon,label])=>(
                <div key={label} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:C.textSub}}>
                  <span>{icon}</span><span>{label}</span>
                </div>
              ))}
            </div>
          </Card>

          <Card>
            <Label>주간 기록 요약</Label>
            {(()=>{
              const rows=repWeek.map((d,i)=>{
                const rec=records[d]||{}, ch=checks[d]||{};
                const done=checkItems.filter(it=>ch[it.id]).length;
                const meals=rec.meals||[], exs=rec.exercises||[];
                const calTotal=meals.reduce((s,m)=>s+(m.cal||0),0);
                const hasAny=rec.weight||meals.length>0||exs.length>0||done>0;
                if(!hasAny||d>today) return null;
                return (
                  <div key={d} style={{padding:"12px 0",borderBottom:`1px solid ${C.border}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <div style={{width:28,height:28,borderRadius:8,background:`linear-gradient(135deg,${C.primary}28,${C.accent}28)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:C.primary}}>{WEEKDAYS[i]}</div>
                      <div style={{fontSize:13,fontWeight:700,color:C.textMain}}>{fmtDate(d)}</div>
                      {rec.weight&&<div style={{fontSize:12,color:C.textSub,marginLeft:"auto",fontFamily:"monospace"}}>{rec.weight}kg</div>}
                    </div>
                    <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                      {done>0&&<span style={{fontSize:11,background:`${C.primary}18`,color:C.primaryDk,borderRadius:6,padding:"3px 8px",fontWeight:600}}>✓ {done}/{checkItems.length}</span>}
                      {calTotal>0&&<span style={{fontSize:11,background:`${C.accent}18`,color:C.accent,borderRadius:6,padding:"3px 8px",fontWeight:600}}>🍽 {calTotal}kcal</span>}
                      {exs.length>0&&<span style={{fontSize:11,background:"#c4826a18",color:"#c4826a",borderRadius:6,padding:"3px 8px",fontWeight:600}}>💪 {exs.length}회</span>}
                    </div>
                  </div>
                );
              });
              return rows.some(Boolean) ? rows : (
                <div style={{textAlign:"center",padding:"20px 0",color:C.textMute,fontSize:14}}>이 주의 기록이 없어요</div>
              );
            })()}
          </Card>

          <Card>
            <Label>전체 기록 통계</Label>
            <div style={{display:"flex",gap:10}}>
              {[
                {label:"기록일",value:`${Object.keys(records).length}일`,color:C.accent},
                {label:"최저 몸무게",value:allWeightData.length?`${Math.min(...allWeightData.map(d=>d.value))}kg`:"—",color:C.good},
                {label:"총 감량",value:lostW>0?`${lostW.toFixed(1)}kg`:"—",color:C.primary},
              ].map(({label,value,color})=>(
                <div key={label} style={{flex:1,background:C.bg,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
                  <div style={{fontSize:17,fontWeight:800,color,fontFamily:"monospace"}}>{value}</div>
                  <div style={{fontSize:11,color:C.textSub,marginTop:4}}>{label}</div>
                </div>
              ))}
            </div>
          </Card>

          <button onClick={()=>{
            if(confirm("목표를 다시 설정하면 설정값만 초기화됩니다. 기록 데이터는 유지돼요. 계속할까요?")) {
              setSetup(null);
            }
          }} style={{width:"100%",padding:13,borderRadius:12,background:"#eef3f8",color:C.textSub,border:"none",fontSize:13,fontWeight:600,cursor:"pointer",marginTop:4}}>
            ⚙️ 목표 다시 설정
          </button>

          <button onClick={()=>{
            if(confirm("⚠️ 모든 기록 데이터가 삭제됩니다. 정말 초기화할까요?")) {
              localStorage.clear();
              location.reload();
            }
          }} style={{width:"100%",padding:13,borderRadius:12,background:"#fdf0f2",color:C.warn,border:`1px solid ${C.warn}30`,fontSize:13,fontWeight:600,cursor:"pointer",marginTop:8}}>
            🗑 전체 데이터 초기화
          </button>
        </>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
